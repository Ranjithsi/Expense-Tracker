{% extends "base.html" %}
{% block title %}Add Expense - Expense Tracker{% endblock %}
{% block page_title %}Add Expense{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header">New Expense Entry</div>
      <div class="card-body">
        <form method="POST" enctype="multipart/form-data" novalidate>
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" value="{{ form.get('title','') }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Amount (₹)</label>
            <input type="number" step="0.01" min="0.01" name="amount" class="form-control" value="{{ form.get('amount','') }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="category_id" class="form-select" required>
              <option value="">Select category</option>
              {% for c in categories %}
              <option value="{{ c.id }}"><i class="bi {{ c.icon }}"></i> {{ c.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control" id="expenseDate" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Receipt image (optional)</label>
            <input type="file" name="receipt" class="form-control" accept=".png,.jpg,.jpeg,.gif,.pdf">
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="isRecurring" name="is_recurring" onchange="document.getElementById('freqWrap').classList.toggle('d-none', !this.checked)">
            <label class="form-check-label" for="isRecurring">This is a recurring expense</label>
          </div>
          <div class="mb-3 d-none" id="freqWrap">
            <label class="form-label">Frequency</label>
            <select name="recurring_frequency" class="form-select">
              <option value="weekly">Weekly</option>
              <option value="monthly" selected>Monthly</option>
              <option value="yearly">Yearly</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Notes (optional)</label>
            <textarea name="notes" class="form-control" rows="2">{{ form.get('notes','') }}</textarea>
          </div>
          <button type="submit" class="btn btn-danger"><i class="bi bi-check-lg"></i> Save Expense</button>
          <a href="{{ url_for('expense.list_expense') }}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
  const d = document.getElementById('expenseDate');
  if (!d.value) d.valueAsDate = new Date();
</script>
{% endblock %}
