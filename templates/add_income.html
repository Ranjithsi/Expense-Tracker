{% extends "base.html" %}
{% block title %}Add Income - Expense Tracker{% endblock %}
{% block page_title %}Add Income{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header">New Income Entry</div>
      <div class="card-body">
        <form method="POST" novalidate>
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" value="{{ form.get('title','') }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Amount (₹)</label>
            <input type="number" step="0.01" min="0.01" name="amount" class="form-control" value="{{ form.get('amount','') }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="category_id" class="form-select" required>
              <option value="">Select category</option>
              {% for c in categories %}
              <option value="{{ c.id }}">{{ c.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control" value="{{ form.get('date', current_year|string + '-01-01') }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Notes (optional)</label>
            <textarea name="notes" class="form-control" rows="2">{{ form.get('notes','') }}</textarea>
          </div>
          <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Save Income</button>
          <a href="{{ url_for('income.list_income') }}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>document.querySelector('input[name="date"]').valueAsDate = document.querySelector('input[name="date"]').value ? undefined : new Date();</script>
{% endblock %}
