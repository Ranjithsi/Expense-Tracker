{% extends "base.html" %}
{% block title %}Login - Expense Tracker{% endblock %}
{% block auth_content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-brand"><i class="bi bi-wallet2"></i> ExpenseTracker</div>
    <h4 class="mb-3">Welcome back</h4>
    <form method="POST" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      
      <div class="mb-3">
        <label class="form-label">Username or Email</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember" id="remember">
          <label class="form-check-label" for="remember">Remember me</label>
        </div>
        <a href="{{ url_for('auth.forgot_password') }}" class="small">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="text-center mt-3 mb-0">Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
  </div>
</div>
{% endblock %}
