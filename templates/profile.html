{% extends "base.html" %}
{% block title %}Profile - Expense Tracker{% endblock %}
{% block page_title %}Profile{% endblock %}
{% block content %}

<div class="row g-3">
  <div class="col-lg-6">
    <div class="card mb-3">
      <div class="card-header">Account Details</div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('auth.profile') }}">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" value="{{ current_user.username }}" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="full_name" class="form-control" value="{{ current_user.full_name or '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" value="{{ current_user.email }}" required>
          </div>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Monthly Budget</div>
      <div class="card-body">
        <p class="text-muted small">Set a monthly spending limit to receive alerts on your dashboard.</p>
        <form method="POST" action="{{ url_for('auth.set_budget') }}" class="d-flex gap-2">
          <input type="number" step="0.01" min="0" name="monthly_budget" class="form-control" value="{{ current_user.monthly_budget }}">
          <button type="submit" class="btn btn-primary text-nowrap">Set Budget</button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card">
      <div class="card-header">Change Password</div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('auth.change_password') }}">
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" name="current_password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="form-control" required minlength="6">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control" required minlength="6">
          </div>
          <button type="submit" class="btn btn-warning">Change Password</button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
