{% extends "base.html" %}
{% block title %}Edit Expense - Expense Tracker{% endblock %}
{% block page_title %}Edit Expense{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header">Edit Expense Entry</div>
      <div class="card-body">
        <form method="POST" enctype="multipart/form-data" novalidate>
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" value="{{ record.title }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Amount (₹)</label>
            <input type="number" step="0.01" min="0.01" name="amount" class="form-control" value="{{ record.amount }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="category_id" class="form-select" required>
              {% for c in categories %}
              <option value="{{ c.id }}" {{ 'selected' if c.id==record.category_id }}>{{ c.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control" value="{{ record.date }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Receipt image</label><br>
            {% if record.receipt_image %}
              <a href="{{ url_for('static', filename='images/receipts/' + record.receipt_image) }}" target="_blank" class="d-block mb-2"><i class="bi bi-paperclip"></i> Current receipt</a>
            {% endif %}
            <input type="file" name="receipt" class="form-control" accept=".png,.jpg,.jpeg,.gif,.pdf">
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="isRecurring" name="is_recurring" {{ 'checked' if record.is_recurring }} onchange="document.getElementById('freqWrap').classList.toggle('d-none', !this.checked)">
            <label class="form-check-label" for="isRecurring">This is a recurring expense</label>
          </div>
          <div class="mb-3 {{ '' if record.is_recurring else 'd-none' }}" id="freqWrap">
            <label class="form-label">Frequency</label>
            <select name="recurring_frequency" class="form-select">
              {% for f in ['weekly','monthly','yearly'] %}
              <option value="{{ f }}" {{ 'selected' if record.recurring_frequency==f }}>{{ f|capitalize }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Notes (optional)</label>
            <textarea name="notes" class="form-control" rows="2">{{ record.notes or '' }}</textarea>
          </div>
          <button type="submit" class="btn btn-danger"><i class="bi bi-check-lg"></i> Update Expense</button>
          <a href="{{ url_for('expense.list_expense') }}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
